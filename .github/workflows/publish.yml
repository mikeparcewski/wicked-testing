name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (pack but do not publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  publish:
    name: Validate and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate package structure
        run: npm test

      - name: Verify package version matches tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "Tag:     $TAG"
          echo "Package: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: tag ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Pack (dry run preview)
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
